<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-image: url("https://images.unsplash.com/photo-1494172961521-33799ddd43a5?ixid=MnwxMjA3fDB8MHxzZWFyY2h8MXx8dm90aW5nfGVufDB8fDB8fA%3D%3D&ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60");
            background-repeat: no-repeat;
            background-size: cover;
            opacity: 0.9;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 9%;
        }

        h1 {
            display: flex;
            justify-content: center;
            margin: 10rem;
            font-family: 'Courier New';
            font-weight: bold;
            font-size: 3rem;
            color: white;
        }

        .btn {
            display: inline-block;
            padding: .8rem 3rem;
            border: .2rem solid blueviolet;
            color: var(--red);
            cursor: pointer;
            font-size: 1.7rem;
            border-radius: .5rem;
            position: relative;
            overflow: hidden;
            z-index: 0;
            margin-top: 1rem;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0%;
            height: 100%;
            background: blueviolet;
            transition: .3s linear;
            z-index: -1;
        }

        .btn:hover::before {
            width: 100%;
            left: 0;
        }

        .btn:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>WELCOME TO ONLINE VOTING SYSTEM</h1>
    <div class="container">
        <button class="btn" onclick="login()">Tap to vote</button>
    </div>
</body>
